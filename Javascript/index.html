<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <style>
        body {
            height: 5000px;
            background: linear-gradient(#fba, skyblue);
        }
    </style>
</head>

<body>
    <script>
        // map() 创建一个新的数组，数组中每个元素是调用一次提供函数后返回的结果
        function myMap(arr, callback) {
            let result = [];
            for (let i = 0; i < arr.length; i++) {
                result.push(callback(arr[i], i))
            }
            return result;
        }
        // reduce() 从左到右每个函数执行一次回调函数，并把上一次回调函数的返回值放在一个暂存器中传给下次回调函数，并返回最后一次回调函数的返回值；
        function myReduce(arr, callback, init) {
            if (init === undefined) init = arr[0];
            let result = init;
            result = callback(result, arr[0]);
            for (let i = 1; i < arr.length; i++) {
                result = callback(result, arr[i]);
            }
            return result
        }
        // filter() 过滤数组中的元素，返回一个新数组

        function myFilter(arr, callback) {
            let result = [];
            for (let i = 0; i < arr.length; i++) {
                if (callback(arr[i], i)) result.push(arr[i]);
            }
            return result;
        }

        // find() 找到第一个满足测试函数的元素并返回那个元素的值,如果没有找到返回undefined
        function myFind(arr, callback) {
            for (let i = 0; i < arr.length; i++) {
                if (callback(arr[i], i)) return arr[i];
            }
        }
        // findIndex() 找到第一个满足测试函数的元素的索引，如果没有找到返回 -1
        function myFindIndex(arr, callback) {
            for (let i = 0; i < arr.length; i++) {
                if (callback(arr[i], i)) return i;
            }
            return -1;
        }
        // every() every() 方法测试一个数组内的所有元素是否都能通过某个指定函数的测试。它返回一个布尔值。
        // 注意：若收到一个空数组，此方法在一切情况下都会返回 true。
        function myEvery(arr, callback) {
            if (!arr) return true;
            for (let i = 0; i < arr.length; i++) {
                if (!callback(arr[i], i)) return false;
            }
            return true;
        }
        // some() 方法测试数组中是不是至少有1个元素通过了被提供的函数测试。它返回的是一个Boolean类型的值。
        // 注意：如果用一个空数组进行测试，在任何情况下它返回的都是false。
        function mySome(arr, callback) {
            if (!arr) return false;
            for (let i = 0; i < arr.length; i++) {
                if (callback(arr[i], i)) return true;
            }
            return false;
        }


        // forEach()+indexOf()
        function unique(arr) {
            let result = [];
            for (let i = 0; i < arr.length; i++) {
                if (arr.indexOf(arr[i]) === i) {
                    result.push(arr[i])
                }
            }
            return result;
        }
        // forEach()+对象容器
        function unique2(arr) {
            let result = []; // 返回新数组
            let obj = {}; // 将数组中的值作为下标存到obj中
            for (let i = 0; i < arr.length; i++) {
                if (obj[arr[i]] === undefined) {
                    // 将item作为下表存储在obj中
                    obj[arr[i]] = true;
                    result.push(arr[i]);
                }
            }
            obj = null;
            return result;
        }
        // from+Set或...+Set
        function unique3(arr) {
            // 将数组转化为集合 Set
            return [...new Set(arr)]
        }

        // console.log(unique(arr));
        // console.log(unique2(arr));
        // console.log(unique3(arr));

        // 数组合并与拆分
        function myConcat(arr, ...args) {
            let result = [...arr];
            for (let i = 0; i < args.length; i++) {
                if (Array.isArray(args[i])) {
                    result.push(...args[i])
                } else {
                    result.push(args[i])
                }
            }
            return result;
        }
        // slice 数组切片 截取数组中一段元素返回一个新数组
        function mySlice(arr, begin, end) {
            if (arr === []) {
                return [];
            }
            // begin 判断
            begin = begin || 0;
            if (begin >= arr.length) {
                return [];
            }
            // end 判断
            end = end || arr.length;
            if (end < begin) {
                end = arr.length;
            }
            let result = [];
            for (let i = 0; i < arr.length; i++) {
                if (i >= begin && i < end) {
                    result.push(arr[i])
                }
            }
            return result;
        }

        // 数组扁平化



        // 递归+concat()

        function flatten(arr) {
            let result = [];
            for (let i = 0; i < arr.length; i++) {
                if (Array.isArray(arr[i])) {
                    result = result.concat(flatten(arr[i]))
                } else {
                    result.push(arr[i])
                }
            }
            return result;
        }
        // some()+concat()
        function flatten2(arr) {
            let result = [...arr];
            while (result.some(item => Array.isArray(item))) {
                result = [].concat(...result)
            }
            return result;
        }

        let arr = [1, 2, 3, 4, 5, 6, 7, 8, 9, 0];

        // 数组分块
        function chunk(arr, size = 1) {
            if (arr.length === 0) return [];
            // 声明两个变量，都是数组，一个结果 一个暂存
            let result = [];
            let tmp = [];
            for (let i = 0; i < arr.length; i++) {
                if (tmp.length === 0) {
                    result.push(tmp);
                }
                tmp.push(arr[i]);
                if (tmp.length === size) {
                    tmp = [];
                }
            }
            tmp = null;
            return result;
        }

        // 获取数组差异 difference(arr,arr2) 得到当前数组中所有不在arr2中的元素组成的个数组(不改变原数组)
        // difference([1,3,5,7],[5,8]) ===> [1,3,7]
        function difference(arr, arr2) {
            if (arr.length === 0) {
                return [];
            }
            if (arr2.length === 0) {
                return arr.slice()
            }
            const result = arr.filter(item => !arr2.includes(item))
            return result;
        }
        // pull(arr,values) 删除数组中部分元素 返回删除的元素 原数组改变
        // pullAll(arr,[value]) 删除数组中部分元素,参数变为数组 原数组改变
        // 删除原数组中与value相同的元素 
        function pull(arr, ...values) {
            let result = []
            for (let i = 0; i < arr.length; i++) {
                if (values.includes(arr[i])) {
                    result.push(arr[i])
                    arr.splice(i, 1);
                    i--;
                }
            }
            return result
        }

        function pullAll(arr, values) {
            let result = []
            for (let i = 0; i < arr.length; i++) {
                if (values.includes(arr[i])) {
                    result.push(arr[i]);
                    arr.splice(i, 1);
                    i--;
                }
            }
            return result
        }


        // drop(arr,count,lr)获取数组中部分元素 不改变当前数组 count默认是 1 lr默认为 1 左边 
        // 得到左边count个元素或者右边count个元素
        // 得到当前数组过滤掉左边count个后剩余元素组成的数组 
        // drop([1,3,5,7],2)===>[5,7]
        function drop(arr, count = 1, lr = 1) {
            let res = [];
            for (let i = 0; i < arr.length; i++) {
                if (lr === -1) {
                    if (i > arr.length - 1 - count) {
                        res.push(arr[i])
                    }
                } else {
                    if (i < count) {
                        res.push(arr[i])
                    }
                }
            }
            return res;
        }

        // 对象操作

        // 构造函数实例化对象
        function Person(name, age) {
            this.name = name;
            this.age = age;
            // return [this.name, this.age]
        }

        function newInstance(Fn, ...args) {
            const obj = {};
            let result = Fn.call(obj, ...args);
            obj.__proto__ = Fn.prototype;
            return result instanceof Object ? result : obj;
        }

        const p = newInstance(Person, 'zs', 21)

        // myInstanceOf(obj,Type) 判断obj是否是type类新的实例
        // Type的原型对象是否是obj的原型链上的某个对象，如果是返回true，否则返回false
        function myInstanceOf(obj, Fn) {
            let prototype = Fn.prototype;
            let proto = obj.__proto__;
            while (proto) {
                if (prototype === proto) {
                    return true
                }
                proto = proto.__proto__;
            }
            return false;
        }

        // 对象合并 mergeObject(...objs) 合并多个对象 返回合并后的对象，不改变原对象

        function mergeObject(...args) {
            let result = {};
            // 遍历参数对象
            args.forEach(arg=>{
                Object.keys(arg).forEach(key=>{
                    console.log(key);
                    if(result.hasOwnProperty(key)){
                        result[key]=[].concat(result[key],arg[key])
                    }else{
                        result[key]=arg[key]
                    }
                })
            })
            return result

        }
        const obj1 = {
            a: [{
                x: 2
            }, {
                y: 4
            }],
            b: 1
        }
        const obj2 = {
            a: {
                z: 3
            },
            b: [2, 3],
            c: 'foo'
        }
        console.log(mergeObject(obj1,obj2));
    </script>
