    <script>
        // call函数封装
        // 改变函数this的指向来执行函数
        function call(fn, obj, ...args) {
            // 功能实现
            if (obj === undefined || obj === null) {
                obj = globalThis; // 全局对象
            }
            obj.temp = fn;
            // 调用temp方法 临时方法暂存函数
            let result = obj.temp(...args);
            // 删除temp方法
            delete obj.temp
            // 返回
            return result;
        }
        // apply函数封装
        // 改变函数this的指向来执行函数
        function apply(fn, obj, args) {
            console.log(args);
            // 功能实现
            if (obj === undefined || obj === null) {
                obj = globalThis; // 全局对象
            }
            obj.temp = fn;
            // 调用temp方法 临时方法暂存函数
            let result = obj.temp(...args);
            // 删除temp方法
            delete obj.temp
            // 返回
            return result;
        }
        // bind函数封装
        // 改变函数this的指向来执行函数
        function bind(fn, obj, ...args) {
            // 返回一个可执行函数
            return function (...args2) {
                // 执行call函数
               return call(fn, obj, ...args, ...args2)
            };
        }

        function fn1(name, age) {
            console.log(this)
            console.log(name + this.c + age);

        let obj = {
