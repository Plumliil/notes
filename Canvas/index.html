<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>canvas</title>
</head>
<body>
    <canvas id="cvs" width="500" height="300">
        浏览器不支持canvas
    </canvas>
    <script>
        // 1.找到画布对象
        let cvs=document.querySelector('#cvs');
        // 2.上下文画笔
        let ctx=cvs.getContext('2d');
        ctx.moveTo(50,50);
        ctx.lineTo(50,200);
        ctx.lineTo(100,200);
        ctx.lineTo(100,150);


        ctx.lineCap='round'
        ctx.strokeStyle='aqua';
        ctx.lineWidth=10;
        ctx.stroke();
        // ctx.fill()
</script>
</body>
</html>
