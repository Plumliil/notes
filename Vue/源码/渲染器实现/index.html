<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app"></div>
    <script src="./randerer.js"></script>
    <script>
        // 1.通过h函数创建vnode
        // h(name,props,childrenNode)
        const vnode = h(
                    'div',
            { class: 'pl',id:'aaa' },
            [
                h('h2', null, '当前计数100'),
                h('button', {onClick:function(){console.log('+1')}}, '+1'),
            ]
        )
        console.log(vnode);
        // 通过mount函数将vnode挂载到div为app上
        mount(vnode,document.querySelector('#app'))

        // 创建新的vnode
        const vnode1=h('div',{class:'newPl',id:'aaa'},'diff算法');

        setTimeout(() => {
            patch(vnode,vnode1)
        }, 100);
    </script>
</body>

</html>
