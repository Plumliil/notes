<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- <script src="../../../node_modules/@vue/reactivity/dist/reactivity.global.js"></script> -->
    <script src="./reactivity.global.js"></script>
    <div id="app"></div>
    <script>
        const {
            effect, 
            // 副作用函数,如果此函数以来的数据发生变化会重新执行 重新更新
            reactive
            // 响应式函数 将数据改变成响应式
        } = VueReactivity;
        const data = {
            name: 'zs',
            age: 21,
            hobbies: {
                eat: 'junk food'
            }
        };
        const state= reactive(data);
        // console.log(state);
        // const state1 = reactive(data);
        // const state2 = reactive(data);
        // console.log(state1===state2);
        effect(()=>{
            // 默认会先执行一次,对响应式数据取值
            document.querySelector('#app').innerHTML=state.name+'年龄是'+state.age
            console.log(state);
        })
        setTimeout(() => {
            state.age=21;
            console.log(state);
        }, 2000);
    </script>
</body>

</html>
