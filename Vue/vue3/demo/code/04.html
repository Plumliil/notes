<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue-Document</title>
</head>

<body>
    <div id="app"></div>
    <template id="my-app">
        <h2>{{info}}</h2>
        <button @click="changeInfo">changeInfo</button>
        <button @click="changeInfoName">changeInfoName</button>
        <button @click="changeInfoHobbies">changeInfoHobbies</button>
    </template>
    <script src="../js/vue.global.js"></script>

    <script>
        const App = {
            template: '#my-app',
            data: function () {
                return {
                    info:{
                        name:'zs',
                        age:18,
                        hobbies:['eat','code']
                    }
                }
            },
            methods:{
                changeInfo(){
                    this.info={name:'ls'}
                },
                changeInfoName(){
                    this.info.name='ww'
                },
                changeInfoHobbies(){
                    this.info.hobbies.pop()
                }
            },
            watch:{
                // info:{
                //     handler(newI,oldI){
                //         console.log(newI,oldI);
                //     },
                //     deep:true,
                //     immediate:true
                // }
                'info.name':function(newv,oldv){
                    console.log(newv,oldv);
                }
            }
        }
        Vue.createApp(App).mount('#app')
    </script>
</body>

</html>
